<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup 2026 — We're Going</title>
  </head>
  <body>
    <div id="app">
      <header>
        <p class="subtitle">Road trip across the USA</p>
        <h1>World Cup 2026</h1>
        <p class="route">Liel &middot; Hen &middot; Didi &middot; Ian</p>
      </header>

      <main>
        <p class="label">Time until takeoff</p>
        <div id="countdown">
          <div class="unit">
            <span id="days">--</span>
            <span class="unit-label">days</span>
          </div>
          <div class="sep">:</div>
          <div class="unit">
            <span id="hours">--</span>
            <span class="unit-label">hours</span>
          </div>
          <div class="sep">:</div>
          <div class="unit">
            <span id="minutes">--</span>
            <span class="unit-label">minutes</span>
          </div>
          <div class="sep">:</div>
          <div class="unit">
            <span id="seconds">--</span>
            <span class="unit-label">seconds</span>
          </div>
        </div>
        <p class="target-date">June 11, 2026</p>
      </main>

      <footer>
        <p id="crew-message"></p>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
